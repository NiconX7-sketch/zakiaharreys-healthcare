<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Zakiyah Arreys Healthcare</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background: white; border-radius: 12px; width: 100%; max-width: 400px; padding: 40px; text-align: center; }
        .login-header i { font-size: 48px; color: #2e7d32; margin-bottom: 15px; }
        .login-header h1 { color: #333; margin-bottom: 5px; }
        .login-header p { color: #666; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .login-btn { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; }
        .login-btn:hover { background: #1b5e20; }
        .error-message { background: #fee; color: #c62828; padding: 12px; border-radius: 8px; margin-top: 15px; display: none; }
        .info-note { margin-top: 20px; padding: 12px; background: #f0fdf4; border-radius: 8px; font-size: 12px; color: #166534; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-leaf"></i>
            <h1>Admin Login</h1>
            <p>Zakiyah Arreys Healthcare</p>
        </div>
        <form id="loginForm">
            <div class="form-group"><input type="text" id="username" placeholder="Username" required></div>
            <div class="form-group"><input type="password" id="password" placeholder="Password" required></div>
            <button type="submit" class="login-btn">Login</button>
            <div class="error-message" id="errorMsg">Invalid username or password</div>
        </form>
        <div class="info-note"><i class="fas fa-shield-alt"></i> Secure Admin Area</div>
    </div>
    <script>
        const ADMIN_USERNAME = 'zakiyah_admin';
        const ADMIN_PASSWORD = 'Zakiyah@2026!';
        if (localStorage.getItem('adminLoggedIn') === 'true') window.location.href = 'dashboard.html';
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminUser', username);
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => document.getElementById('errorMsg').style.display = 'none', 3000);
            }
        });
    </script>
</body>
</html>
